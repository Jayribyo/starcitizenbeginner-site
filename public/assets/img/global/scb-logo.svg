<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Bronze Gradient -->
    <linearGradient id="bronzeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3C26A"></stop>
      <stop offset="50%" stop-color="#C29A3A"></stop>
      <stop offset="100%" stop-color="#A67F2B"></stop>
    </linearGradient>
  </defs>

  <!-- Rounded square outline -->
  <rect x="10" y="10" width="140" height="140" rx="28" ry="28" fill="none" stroke="url(#bronzeGradient)" stroke-width="3"></rect>

  <!-- SCB Text -->
  <text x="50%" y="65" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="url(#bronzeGradient)" letter-spacing="3">
    SCB
  </text>

  <!-- Divider -->
  <line x1="45" y1="90" x2="115" y2="90" stroke="url(#bronzeGradient)" stroke-width="2" opacity="0.85"></line>

  <!-- SMART START -->
  <text x="50%" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="url(#bronzeGradient)" letter-spacing="2">
    SMART START
  </text>

</svg>