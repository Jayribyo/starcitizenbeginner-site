<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF6D8"/>
      <stop offset="24%" stop-color="#F2D98A"/>
      <stop offset="55%" stop-color="#D4A64A"/>
      <stop offset="82%" stop-color="#9C6D1F"/>
      <stop offset="100%" stop-color="#6E4A17"/>
    </linearGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF9E6"/>
      <stop offset="38%" stop-color="#F5E3A1"/>
      <stop offset="70%" stop-color="#D8B158"/>
      <stop offset="100%" stop-color="#9D6F22"/>
    </linearGradient>

    <filter id="softShadow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.2"/>
      <feOffset dx="0" dy="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textLift" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.4" result="b"/>
      <feOffset in="b" dx="0" dy="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Frame -->
  <g filter="url(#softShadow)" fill="none" stroke="url(#goldFrame)" stroke-linecap="round" stroke-linejoin="round">
    <path stroke-width="22"
          d="M140 132
             Q140 112 160 112
             L290 112
             Q312 112 324 130
             L394 236
             Q404 250 404 262
             Q404 274 394 288
             L324 394
             Q312 412 290 412
             L160 412
             Q140 412 140 392
             L140 340"/>
    <path stroke-width="8" opacity="0.85"
          d="M170 148
             Q170 138 180 138
             L282 138
             Q298 138 306 152
             L366 246
             Q374 258 374 262
             Q374 266 366 278
             L306 372
             Q298 386 282 386
             L180 386
             Q170 386 170 376
             L170 340"/>
  </g>

  <!-- Star centered over C -->
  <path d="M240 154
           L249 172 L269 172
           L253 184 L259 204
           L240 192 L221 204
           L227 184 L211 172
           L231 172 Z"
        fill="url(#goldFrame)"/>

  <!-- SCB -->
  <g filter="url(#textLift)">
    <text x="240" y="302"
          text-anchor="middle"
          font-family="Orbitron, Eurostile, Bank Gothic, 'Segoe UI', Arial, sans-serif"
          font-weight="800"
          font-size="112"
          letter-spacing="10"
          fill="url(#goldText)">SCB</text>
    <text x="240" y="302"
          text-anchor="middle"
          font-family="Orbitron, Eurostile, Bank Gothic, 'Segoe UI', Arial, sans-serif"
          font-weight="800"
          font-size="112"
          letter-spacing="10"
          fill="none"
          stroke="rgba(255,255,255,0.28)"
          stroke-width="1.5"
          paint-order="stroke fill">SCB</text>
  </g>
</svg>
